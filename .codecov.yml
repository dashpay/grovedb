codecov:
  require_ci_to_pass: true

ignore:
  - "**/test_utils.rs"
  - "**/test_utils/**"
  - "**/tests.rs"
  - "**/tests/**"
  - "fuzz/**"

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 80%

comment:
  layout: "condensed_header, diff, flags, components, condensed_files"
  behavior: default
  require_changes: true

flag_management:
  default_rules:
    carryforward: true
  individual_flags:
    - name: core
      paths:
        - costs/
        - path/
        - visualize/
        - grovedb-version/
        - grovedbg-types/
        - storage/
        - grovedb-epoch-based-storage-flags/
        - grovedb-element/
        - merk/
        - grovedb-query/
    - name: trees
      paths:
        - grovedb-merkle-mountain-range/
        - grovedb-dense-fixed-sized-merkle-tree/
        - grovedb-bulk-append-tree/
        - grovedb-commitment-tree/
    - name: grovedb
      paths:
        - grovedb/
