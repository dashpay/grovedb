name: Coverage

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop
      - 'v[0-9]*.[0-9]*-dev'

permissions:
  pull-requests: write

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      any-code: ${{ steps.filter.outputs.any-code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            any-code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'

  coverage:
    name: Code Coverage
    needs: detect-changes
    if: needs.detect-changes.outputs.any-code == 'true'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools

      - name: Enable Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          override_branch: ${{ github.ref_name }}

      # Cache baseline coverage for PR comparison
      - name: Cache baseline coverage
        if: github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: lcov.info
          key: coverage-lcov-${{ github.ref_name }}-${{ github.sha }}

      # PR coverage diff analysis
      - name: Preserve PR coverage
        if: github.event_name == 'pull_request'
        run: cp lcov.info pr-lcov.info

      - name: Restore baseline coverage
        if: github.event_name == 'pull_request'
        id: baseline
        uses: actions/cache/restore@v4
        with:
          path: lcov.info
          key: coverage-lcov-${{ github.base_ref }}-notexact
          restore-keys: |
            coverage-lcov-${{ github.base_ref }}-

      - name: Setup Python
        if: github.event_name == 'pull_request'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run coverage diff analysis
        if: github.event_name == 'pull_request'
        env:
          BASELINE_CACHE_HIT: ${{ steps.baseline.outputs.cache-matched-key != '' }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          python .github/scripts/coverage-diff.py \
            --baseline lcov.info \
            --pr pr-lcov.info \
            --base-ref "$BASE_REF" \
            --baseline-available "$BASELINE_CACHE_HIT" \
            --output coverage-report.md

      - name: Post PR comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- coverage-diff-bot -->"
          BODY="$(cat coverage-report.md)"

          # Check for existing comment
          EXISTING=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" \
            | head -1)

          if [ -n "$EXISTING" ]; then
            gh api \
              "repos/${{ github.repository }}/issues/comments/${EXISTING}" \
              -X PATCH \
              -f body="${MARKER}
          ${BODY}"
          else
            gh api \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="${MARKER}
          ${BODY}"
          fi
