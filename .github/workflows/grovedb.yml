name: GroveDB

on:
  workflow_dispatch:
  push:
    branches: [master, develop]
  pull_request:
    branches:
      - master
      - develop
      - 'v[0-9]+.[0-9]+-dev'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      any-code: ${{ steps.filter.outputs.any-code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            any-code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'

  build-test:
    name: Build Tests (instrumented)
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.any-code == 'true'
      && !contains(github.event.pull_request.labels.*.name, 'skip-tests')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"
          # cargo-llvm-cov uses target/llvm-cov-target/ instead of target/
          workspaces: ". -> target/llvm-cov-target"
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-nextest
      - name: Build test binaries with coverage instrumentation
        run: >
          cargo llvm-cov build
          --workspace
          --all-features
          --tests
      - name: Save instrumented build artifacts
        uses: actions/cache/save@v4
        with:
          path: target/llvm-cov-target
          key: llvm-cov-build-${{ github.sha }}-${{ hashFiles('**/Cargo.lock') }}

  test:
    name: Test (${{ matrix.partition }}/3)
    needs: [detect-changes, build-test]
    if: >-
      needs.detect-changes.outputs.any-code == 'true'
      && !contains(github.event.pull_request.labels.*.name, 'skip-tests')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-nextest
      - name: Restore instrumented build artifacts
        uses: actions/cache/restore@v4
        with:
          path: target/llvm-cov-target
          key: llvm-cov-build-${{ github.sha }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Run tests (shard ${{ matrix.partition }}/3)
        run: >
          cargo llvm-cov nextest
          --workspace
          --all-features
          --partition count:${{ matrix.partition }}/3
          --lcov --output-path lcov.info
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  linting:
    name: Linting
    needs: detect-changes
    if: needs.detect-changes.outputs.any-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Run clippy
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Check verify feature
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: cargo build --no-default-features --features verify -p grovedb

  formatting:
    name: Formatting
    needs: detect-changes
    if: needs.detect-changes.outputs.any-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit
