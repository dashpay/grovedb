name: GroveDB

on:
  workflow_dispatch:
  push:
    branches: [master, develop]
  pull_request:
    branches:
      - master
      - develop
      - 'v[0-9]+.[0-9]+-dev'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      core: ${{ steps.filter.outputs.core }}
      merk: ${{ steps.filter.outputs.merk }}
      trees: ${{ steps.filter.outputs.trees }}
      grovedb: ${{ steps.filter.outputs.grovedb }}
      any-code: ${{ steps.filter.outputs.any-code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'costs/**'
              - 'path/**'
              - 'visualize/**'
              - 'grovedb-version/**'
              - 'grovedbg-types/**'
              - 'storage/**'
              - 'grovedb-epoch-based-storage-flags/**'
              - 'grovedb-element/**'
              - 'grovedb-query/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            merk:
              - 'merk/**'
              - 'costs/**'
              - 'path/**'
              - 'visualize/**'
              - 'grovedb-version/**'
              - 'storage/**'
              - 'grovedb-element/**'
              - 'grovedb-query/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            trees:
              - 'costs/**'
              - 'path/**'
              - 'visualize/**'
              - 'storage/**'
              - 'grovedb-query/**'
              - 'grovedb-merkle-mountain-range/**'
              - 'grovedb-dense-fixed-sized-merkle-tree/**'
              - 'grovedb-bulk-append-tree/**'
              - 'grovedb-commitment-tree/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            grovedb:
              - 'grovedb/**'
              - 'costs/**'
              - 'path/**'
              - 'visualize/**'
              - 'grovedb-version/**'
              - 'grovedbg-types/**'
              - 'storage/**'
              - 'grovedb-epoch-based-storage-flags/**'
              - 'grovedb-element/**'
              - 'merk/**'
              - 'grovedb-query/**'
              - 'grovedb-merkle-mountain-range/**'
              - 'grovedb-dense-fixed-sized-merkle-tree/**'
              - 'grovedb-bulk-append-tree/**'
              - 'grovedb-commitment-tree/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            any-code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'

  test-core:
    name: Test Core
    needs: detect-changes
    if: needs.detect-changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run core crate tests
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: >
          cargo llvm-cov
          -p grovedb-costs
          -p grovedb-path
          -p grovedb-visualize
          -p grovedb-version
          -p grovedbg-types
          -p grovedb-storage
          -p grovedb-epoch-based-storage-flags
          -p grovedb-element
          -p grovedb-query
          --all-features
          --lcov --output-path lcov.info
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: core
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  test-merk:
    name: Test Merk
    needs: detect-changes
    if: needs.detect-changes.outputs.merk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run merk tests
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: >
          cargo llvm-cov
          -p grovedb-merk
          --all-features
          --lcov --output-path lcov.info
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: merk
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  test-trees:
    name: Test Trees
    needs: detect-changes
    if: needs.detect-changes.outputs.trees == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tree crate tests
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: >
          cargo llvm-cov
          -p grovedb-merkle-mountain-range
          -p grovedb-dense-fixed-sized-merkle-tree
          -p grovedb-bulk-append-tree
          -p grovedb-commitment-tree
          --all-features
          --lcov --output-path lcov.info
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: trees
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  test-grovedb:
    name: Test GroveDB (${{ matrix.partition }}/3)
    needs: detect-changes
    if: needs.detect-changes.outputs.grovedb == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-nextest
      - name: Run grovedb tests (shard ${{ matrix.partition }}/3)
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: >
          cargo llvm-cov nextest
          -p grovedb
          --partition count:${{ matrix.partition }}/3
          --lcov --output-path lcov.info
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          flags: grovedb
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  linting:
    name: Linting
    needs: detect-changes
    if: needs.detect-changes.outputs.any-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"
      - name: Run clippy
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Check verify feature
        run: cargo build --no-default-features --features verify -p grovedb

  formatting:
    name: Formatting
    needs: detect-changes
    if: needs.detect-changes.outputs.any-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo generate-lockfile
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
