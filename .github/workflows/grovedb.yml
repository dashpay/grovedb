name: GroveDB

on:
  workflow_dispatch:
  push:
    branches: [master, develop]
  pull_request:
    branches:
      - master
      - develop
      - 'v[0-9]+.[0-9]+-dev'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      any-code: ${{ steps.filter.outputs.any-code }}
      needs-tests: ${{ steps.decide.outputs.needs-tests }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            any-code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - 'Cargo.lock'
            build-files:
              - '**/Cargo.toml'
              - 'Cargo.lock'
      - name: Check if Rust changes are doc-comment-only
        id: doc-check
        if: >-
          steps.filter.outputs.any-code == 'true'
          && steps.filter.outputs.build-files == 'false'
          && github.event_name == 'pull_request'
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          # Extract added/removed lines from .rs diffs, strip +/- prefix and leading whitespace
          CHANGED=$(git diff "$BASE"...HEAD -- '*.rs' | grep -E '^[+-]' | grep -vE '^(\+\+\+|---)' | sed 's/^[+-]//' | sed 's/^[[:space:]]*//')
          # Check if any changed line is NOT a doc comment or blank
          NON_DOC=$(echo "$CHANGED" | grep -vE '^$|^///|^//!' || true)
          if [ -z "$NON_DOC" ]; then
            echo "docs-only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs-only=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Determine if tests are needed
        id: decide
        run: |
          if [[ "${{ steps.doc-check.outputs.docs-only }}" == "true" ]]; then
            echo "needs-tests=false" >> "$GITHUB_OUTPUT"
          else
            echo "needs-tests=${{ steps.filter.outputs.any-code }}" >> "$GITHUB_OUTPUT"
          fi

  build-tests:
    name: Build Tests
    needs: detect-changes
    if: needs.detect-changes.outputs.needs-tests == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"
          workspaces: ". -> target/llvm-cov-target"
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-nextest
      - name: Build and archive tests
        run: >
          cargo llvm-cov nextest-archive
          --workspace
          --all-features
          --archive-file tests.tar.zst
      - name: Upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: tests.tar.zst

  test:
    name: Test (${{ matrix.partition }}/3)
    needs: build-tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-nextest
      - name: Download test archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive
      - name: Run tests (shard ${{ matrix.partition }}/3)
        run: >
          cargo llvm-cov nextest
          --no-report
          --workspace
          --all-features
          --archive-file tests.tar.zst
          --partition count:${{ matrix.partition }}/3
      - name: Upload profraw data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: profraw-${{ matrix.partition }}
          path: target/llvm-cov-target/
          include-hidden-files: true

  coverage-report:
    name: Coverage Report
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@cargo-nextest
      - name: Download test archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive
      - name: Download profraw data
        uses: actions/download-artifact@v4
        with:
          pattern: profraw-*
          path: target/llvm-cov-target/
          merge-multiple: true
      - name: Generate coverage report
        run: >
          cargo llvm-cov report
          --nextest-archive-file tests.tar.zst
          --lcov --output-path lcov.info
      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  linting:
    name: Linting
    needs: detect-changes
    if: needs.detect-changes.outputs.any-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: "false"
      - uses: mozilla-actions/sccache-action@v0.0.9
      - name: Run clippy
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: cargo clippy --workspace --all-features -- -D warnings
      - name: Check verify feature
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: cargo build --no-default-features --features verify -p grovedb

  formatting:
    name: Formatting
    needs: detect-changes
    if: needs.detect-changes.outputs.any-code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit
